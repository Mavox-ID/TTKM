<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try To Kill Me - Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        primary: '#3b82f6',
                        surface: '#ffffff',
                        background: '#f8fafc',
                    }
                }
            }
        }
    </script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="activity" class="text-blue-500 w-8 h-8"></i>
                    TTKM - Online
                </h1>
                <p class="text-slate-500 mt-1">Try To Kill Me - By FPL Group. | v7.90</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-6 flex flex-col justify-between">
                <div class="flex items-center justify-between text-slate-500 mb-4">
                    <h2 class="text-lg font-semibold">Requests today</h2>
                    <i data-lucide="bar-chart-2" class="w-6 h-6 text-blue-400"></i>
                </div>
                <div class="flex items-baseline gap-2">
                    <span id="today-requests" class="text-5xl font-extrabold text-slate-800">0</span>
                    <span class="text-sm font-medium text-slate-400">requests</span>
                </div>
            </div>

            <div class="glass-card p-6 flex flex-col justify-between">
                <div class="flex items-center justify-between text-slate-500 mb-4">
                    <h2 class="text-lg font-semibold">Current load (RPS)</h2>
                    <i data-lucide="zap" class="w-6 h-6 text-yellow-500"></i>
                </div>
                <div class="flex items-baseline gap-2">
                    <span id="current-rps" class="text-5xl font-extrabold text-slate-800">0</span>
                    <span class="text-sm font-medium text-slate-400">\s</span>
                </div>
            </div>
        </div>

        <div class="glass-card p-6 mt-6">
            <div class="flex items-center justify-between mb-6">
                <h2 class="text-lg font-semibold text-slate-700 flex items-center gap-2">
                    <i data-lucide="calendar" class="w-5 h-5 text-indigo-400"></i>
                    Current month's schedule
                </h2>
                <span id="month-name" class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-md">...</span>
            </div>
            <div class="relative h-[400px] w-full">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        const WORKER_URL = 'https://api.fpl.pp.ua';

        let chartInstance = null;
        let lastCount = null;
        let lastTime = null;

        function initChart() {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: 'Total Requests',
                        data: [],
                        borderColor: '#3b82f6',
                        backgroundColor: 'rgba(59, 130, 246, 0.1)',
                        borderWidth: 3,
                        pointBackgroundColor: '#ffffff',
                        pointBorderColor: '#3b82f6',
                        pointBorderWidth: 2,
                        pointRadius: 4,
                        pointHoverRadius: 6,
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: false },
                        tooltip: {
                            backgroundColor: 'rgba(15, 23, 42, 0.9)',
                            padding: 12,
                            titleFont: { size: 14 },
                            bodyFont: { size: 14 },
                            displayColors: false,
                            callbacks: {
                                title: function(context) { return context[0].label + ' число'; },
                                label: function(context) { return context.parsed.y.toLocaleString('ru-RU') + ' запросов'; }
                            }
                        }
                    },
                    scales: {
                        x: {
                            grid: { display: false, drawBorder: false },
                            ticks: { color: '#64748b', font: { family: 'Inter' } }
                        },
                        y: {
                            grid: { color: '#f1f5f9', drawBorder: false },
                            ticks: { 
                                color: '#64748b', 
                                font: { family: 'Inter' },
                                callback: function(value) {
                                    if(value >= 1000) return (value / 1000).toFixed(1) + 'k';
                                    return value;
                                }
                            },
                            beginAtZero: true
                        }
                    },
                    interaction: {
                        intersect: false,
                        mode: 'index',
                    },
                }
            });
        }

        async function fetchMonthlyStats() {
            try {

                const response = await fetch(`${WORKER_URL}/api/stats`);
                const data = await response.json();
                
                updateChart(data);
                
            } catch (error) {
                console.error('Error loading data:', error);
            }
        }

        function updateChart(data) {
            const dateParts = data.month.split('-');
            const date = new Date(dateParts[0], dateParts[1] - 1);
            const monthName = date.toLocaleString('ru-RU', { month: 'long', year: 'numeric' });
            document.getElementById('month-name').innerText = monthName.charAt(0).toUpperCase() + monthName.slice(1);

            const daysInMonth = new Date(dateParts[0], dateParts[1], 0).getDate();
            
            const labels = [];
            const chartData = [];

            let todayTotal = 0;
            const currentDay = new Date().getDate().toString().padStart(2, '0');

            for (let i = 1; i <= daysInMonth; i++) {
                const dayStr = i.toString().padStart(2, '0');
                labels.push(i);
                
                const count = data.stats[dayStr] || 0;
                chartData.push(count);

                if (dayStr === currentDay) {
                    todayTotal = count;
                }
            }

            document.getElementById('today-requests').innerText = todayTotal.toLocaleString('ru-RU');

            chartInstance.data.labels = labels;
            chartInstance.data.datasets[0].data = chartData;
            chartInstance.update();
        }

        async function pollRPS() {
            if(!WORKER_URL) return;

            try {
                const response = await fetch(`${WORKER_URL}/api/stats/today`);
                const data = await response.json();
                
                const currentCount = data.count;
                const currentTime = Date.now();

                document.getElementById('today-requests').innerText = currentCount.toLocaleString('ru-RU');

                if (lastCount !== null && lastTime !== null) {
                    const timeDiff = (currentTime - lastTime) / 1000;
                    const countDiff = currentCount - lastCount;
                    
                    let rps = 0;
                    if (timeDiff > 0 && countDiff > 0) {
                        rps = Math.round(countDiff / timeDiff);
                    }
                    
                    document.getElementById('current-rps').innerText = rps.toLocaleString('ru-RU');
                }

                lastCount = currentCount;
                lastTime = currentTime;

            } catch (error) {
                console.error('Error get RPS:', error);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            fetchMonthlyStats();
            
            setInterval(fetchMonthlyStats, 30000);
            setInterval(pollRPS, 1000);
        });

    </script>
</body>
</html>
