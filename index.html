<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Try To Kill Me - Online</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(226, 232, 240, 0.8);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border-radius: 1rem;
        }
    </style>
</head>
<body class="text-slate-800 p-4 md:p-8">

    <div class="max-w-6xl mx-auto space-y-6">
        <header class="flex items-center justify-between mb-8">
            <div>
                <h1 class="text-3xl font-bold text-slate-900 flex items-center gap-2">
                    <i data-lucide="activity" class="text-blue-500 w-8 h-8"></i>
                    TTKM - Online
                </h1>
                <p class="text-slate-500 mt-1">Try To Kill Me - By FPL Group. | v7.90</p>
            </div>
        </header>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="glass-card p-6">
                <div class="flex items-center justify-between text-slate-500 mb-4">
                    <h2 class="text-lg font-semibold text-blue-600">Requests Today</h2>
                    <i data-lucide="bar-chart-2" class="w-6 h-6"></i>
                </div>
                <div class="flex items-baseline gap-2">
                    <span id="today-requests" class="text-5xl font-extrabold text-slate-800">0</span>
                    <span class="text-sm font-medium text-slate-400">requests</span>
                </div>
            </div>

            <div class="glass-card p-6">
                <div class="flex items-center justify-between text-slate-500 mb-4">
                    <h2 class="text-lg font-semibold text-yellow-600">Real-time Load (RPS)</h2>
                    <i data-lucide="zap" class="w-6 h-6"></i>
                </div>
                <div class="flex items-baseline gap-2">
                    <span id="current-rps" class="text-5xl font-extrabold text-slate-800">0</span>
                    <span class="text-sm font-medium text-slate-400">\s</span>
                </div>
            </div>
        </div>

        <div class="glass-card p-6">
            <h2 class="text-lg font-semibold text-slate-700 flex items-center gap-2 mb-6">
                <i data-lucide="calendar" class="w-5 h-5 text-indigo-400"></i>
                Growth graph: <span id="month-name" class="text-blue-500 ml-1">...</span>
            </h2>
            <div class="relative h-[400px]">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();
        const WORKER_URL = 'https://api.fpl.pp.ua';

        let chartInstance = null;
        let lastCount = 0;
        let lastTime = Date.now();

        function initChart() {
            const ctx = document.getElementById('monthlyChart').getContext('2d');
            chartInstance = new Chart(ctx, {
                type: 'line',
                data: { labels: [], datasets: [{
                    label: 'Total Requests',
                    data: [],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    borderWidth: 3,
                    fill: true,
                    tension: 0.4
                }]},
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    scales: { y: { beginAtZero: true } }
                }
            });
        }

        async function fetchMonthlyStats() {
            try {
                const response = await fetch(`${WORKER_URL}/api/stats?t=${Date.now()}`);
                const data = await response.json();
                
                const dateParts = data.month.split('-');
                const monthName = new Date(dateParts[0], dateParts[1] - 1).toLocaleString('en-US', { month: 'long', year: 'numeric' });
                document.getElementById('month-name').innerText = monthName;

                const labels = [];
                const chartData = [];
                const currentDay = parseInt(data.currentDay);

                for (let i = 1; i <= currentDay; i++) {
                    const dayStr = i.toString().padStart(2, '0');
                    labels.push(i + ' ' + monthName.substring(0,3));
                    chartData.push(data.stats[dayStr] || 0);
                }

                chartInstance.data.labels = labels;
                chartInstance.data.datasets[0].data = chartData;
                chartInstance.update();
            } catch (e) {}
        }

        async function pollRPS() {
            try {
                const response = await fetch(`${WORKER_URL}/api/stats/today?t=${Date.now()}`);
                const data = await response.json();
                
                const currentCount = data.count;
                const currentTime = Date.now();

                document.getElementById('today-requests').innerText = currentCount.toLocaleString();

                if (lastCount > 0) {
                    const timeDiff = (currentTime - lastTime) / 1000;
                    const countDiff = currentCount - lastCount;
                    
                    const rps = countDiff >= 0 ? Math.round(countDiff / timeDiff) : 0;
                    
                    document.getElementById('current-rps').innerText = rps;
                }

                lastCount = currentCount;
                lastTime = currentTime;
            } catch (e) {}
        }

        document.addEventListener('DOMContentLoaded', () => {
            initChart();
            fetchMonthlyStats();
            setInterval(fetchMonthlyStats, 10000);
            setInterval(pollRPS, 1000);
        });
    </script>
</body>
</html>
